syntax = "proto3";

package rip.common.v1;

option go_package = "github.com/rip/rip/packages/proto/gen/go/rip/common/v1;commonv1";

// Axis-aligned bounding box in normalized image coordinates [0, 1].
message BoundingBox {
  float x_min = 1;
  float y_min = 2;
  float x_max = 3;
  float y_max = 4;
}

// World-space point on the store ground plane (meters).
message WorldPoint {
  double world_x = 1;
  double world_y = 2;
  double world_z = 3;
}
