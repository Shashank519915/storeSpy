# RIP CI Foundation — lint matrix per code_style.md §3
name: CI Foundation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript / ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck --filter=@rip/portal --filter=@rip/ui

  buf:
    name: Protobuf / buf
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
        working-directory: packages/proto
      - run: buf format --diff --exit-code
        working-directory: packages/proto

  golang:
    name: Go / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.2
          args: --timeout=5m
        continue-on-error: true

  python:
    name: Python / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check . || true
        continue-on-error: true

  edge-services:
    name: Edge services (Phase 2 cloud dev)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: ingestor test
        working-directory: services/edge/ingestor
        run: go test ./...
      - name: state-publisher build
        working-directory: services/edge/state-publisher
        run: go build ./...
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: cv-orchestrator test
        working-directory: services/edge/cv-orchestrator
        run: pip install -e ".[dev]" && pytest -q
      - name: go-common spatial test
        working-directory: packages/go-common
        run: go test ./spatial/...
      - name: twin-api build
        working-directory: apps/twin-api
        run: go build .

  terraform:
    name: Terraform / fmt + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
      - run: terraform fmt -check -recursive infra/terraform
      - run: |
          for dir in infra/terraform/modules/*/; do
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  design-tokens:
    name: Design token compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint --filter=@rip/portal
      - name: Verify token files exist
        run: |
          for f in primitives semantic domain component typography spacing radius shadow motion tailwind-bridge; do
            test -f "packages/ui/tokens/${f}.css" || (echo "Missing token file: ${f}.css" && exit 1)
          done
