repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.1.2
    hooks:
      - id: golangci-lint
        types: [go]
        pass_filenames: false
        entry: golangci-lint run ./...

  - repo: https://github.com/psf/black
    rev: 25.1.0
    hooks:
      - id: black
        language_version: python3.12
        types: [python]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: pnpm exec eslint
        language: system
        types: [javascript, jsx, ts, tsx]
        pass_filenames: true

      - id: buf-format
        name: buf format
        entry: buf format -w
        language: system
        files: \.proto$
        pass_filenames: true

      - id: buf-lint
        name: buf lint
        entry: buf lint packages/proto
        language: system
        pass_filenames: false
