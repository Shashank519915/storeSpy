# External Secrets Operator — ClusterSecretStore pointing to Vault
# Ticket: RIP-0-025

apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: rip-vault
spec:
  provider:
    vault:
      server: https://vault.rip-system.svc.cluster.local:8200
      path: secret
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets
          serviceAccountRef:
            name: external-secrets
            namespace: rip-system
