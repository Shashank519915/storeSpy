# Dev bootstrap — standalone Vault, KMS auto-unseal, TLS disabled
# Use alone (do not combine with values.yaml — HA TLS config conflicts):
#   helm upgrade --install vault hashicorp/vault -n rip-system -f values-dev.yaml

global:
  enabled: true
  tlsDisable: true

server:
  enabled: true
  image:
    repository: hashicorp/vault
  ha:
    enabled: false
    replicas: 1
    raft:
      enabled: false
  standalone:
    enabled: true
    config: |
      ui = true
      listener "tcp" {
        tls_disable = 1
        address = "[::]:8200"
        cluster_address = "[::]:8201"
      }
      storage "file" {
        path = "/vault/data"
      }
      seal "awskms" {
        region = "us-east-1"
        kms_key_id = "alias/rip-vault-unseal"
      }
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  dataStorage:
    enabled: true
    size: 1Gi
    storageClass: gp2
  auditStorage:
    enabled: false
  affinity: ""

injector:
  enabled: false

ui:
  enabled: true
  serviceType: ClusterIP
